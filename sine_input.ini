/*----------------------------------------------------------------------
  Generate Sine Wave Signal on AD Channel 0
----------------------------------------------------------------------*/
SIGNAL void AIN0_Sine (void)  {
  float amp;          // peak-to-mean voltage
  float frequency;    // output frequency in Hz
  float offset;       // voltage offset
  float duration;     // duration in Seconds
  float val, sine_val;
  long  i, end;

  amp       = 1.25;
  offset    = 1.25;
  frequency = 1500;
  duration  = 10;

  printf ("Generating sine wave signal on ADC Channel 0.\n");
  printf ("Also generating square wave on INT0\n");
  printf ("Frequency: 1500 Hz. Voltage: 1.25 + 1.25 V*sin().\n");

  end = (duration * 100000);
  for (i = 0 ; i < end; i++)  {
    sine_val = __sin (frequency * (((float) STATES) / CLOCK) * 2 * 3.1415926);
    val = (sine_val * amp) + offset;
    AIN0 = val;
    P3.5 = (val > 1.25) ? 1 : 0;      // set T1 high if AIN0 > 2.5V (Schmitt trigger on the board will do this)
    swatch (0.00001);                 // in 10 uSec steps
  }
}

DEFINE BUTTON "AIN0 Sin","AIN0_Sine()"